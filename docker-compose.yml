version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: luhar-samaj-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luhar-samaj-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/luhar-samaj
      - PORT=5000
      - JWT_SECRET=change-this-to-a-secure-secret-key-12345
      - NODE_ENV=production
      # - GOOGLE_DRIVE_CLIENT_EMAIL=your-client-email@project.iam.gserviceaccount.com
      # - GOOGLE_DRIVE_PRIVATE_KEY="-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----"
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: luhar-samaj-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
